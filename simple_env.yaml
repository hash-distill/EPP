name: EPP
channels:
  - pytorch
  - nvidia
  - defaults
dependencies:
  # 核心环境
  - python=3.9
  - pip
  - setuptools
  - wheel

  # PyTorch生态（自动管理CUDA依赖）
  - pytorch=2.1.0
  - torchvision=0.16.0
  - torchaudio=2.1.0
  - pytorch-cuda=11.8  # 统一CUDA 11.8版本

  # 科学计算基础包
  - numpy=1.26.4
  - matplotlib=3.9.2
  - pillow=11.1.0

  # 必要的系统库（仅保留顶层依赖）
  - libgcc-ng=11.2.0
  - libgomp=11.2.0
  - libstdcxx-ng=11.2.0

  # Python工具包（精简版本锁定）
  - brotli-python=1.0.9
  - contourpy=1.2.1
  - cycler=0.11.0
  - fonttools=4.55.3
  - importlib_resources=6.4.0
  - kiwisolver=1.4.4
  - packaging=24.2
  - pyparsing=3.2.0
  - python-dateutil=2.9.0post0
  - six=1.17.0
  - tomli=2.0.1
  - tornado=6.4.2
  - typing_extensions=4.12.2
  - zipp=3.21.0

  # pip依赖
  - pip:
      - fair-esm==2.0.0